<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form - 7 Kendaraan Bergerak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 50%, #00b894 100%);
            overflow: hidden;
            position: relative;
        }

        /* JALAN RAYA */
        .road {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 250px;
            background: repeating-linear-gradient(
                90deg,
                #666 0px,
                #666 30px,
                #fff 30px,
                #fff 60px
            );
            animation: roadMove 30s linear infinite;
        }

        @keyframes roadMove {
            0% { background-position: 0 0; }
            100% { background-position: 3000px 0; }
        }

        /* KENDARAAN 1: MOBIL SPORT MERAH */
        .car1 {
            position: absolute;
            bottom: 80px;
            left: -200px;
            width: 140px;
            height: 70px;
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            border-radius: 20px 20px 5px 5px;
            animation: vehicleMove1 12s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }

        .car1::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 20px;
            width: 25px;
            height: 25px;
            background: #333;
            border-radius: 50%;
            box-shadow: 70px 0 0 #333;
            animation: wheelSpin1 0.8s linear infinite;
        }

        @keyframes vehicleMove1 {
            0% { left: -200px; }
            70% { left: 60%; }
            100% { left: 100vw; }
        }

        @keyframes wheelSpin1 {
            100% { transform: rotate(360deg); }
        }

        /* KENDARAAN 2: TRUK PICKUP BIRU */
        .truck1 {
            position: absolute;
            bottom: 100px;
            left: -250px;
            width: 180px;
            height: 90px;
            background: linear-gradient(45deg, #3498db, #2980b9);
            border-radius: 10px 25px 5px 5px;
            animation: vehicleMove2 18s linear infinite;
        }

        .truck1::before {
            content: '';
            position: absolute;
            top: 10px;
            right: 20px;
            width: 60px;
            height: 35px;
            background: #95a5a6;
            border-radius: 5px;
        }

        .truck1::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 25px;
            width: 28px;
            height: 28px;
            background: #2c3e50;
            border-radius: 50%;
            box-shadow: 90px 0 0 #2c3e50, 130px 0 0 #2c3e50;
            animation: wheelSpin2 1s linear infinite;
        }

        @keyframes vehicleMove2 {
            0% { left: -250px; }
            100% { left: 100vw; }
        }

        @keyframes wheelSpin2 {
            100% { transform: rotate(360deg); }
        }

        /* KENDARAAN 3: KERETA API */
        .train {
            position: absolute;
            bottom: 120px;
            left: -300px;
            width: 220px;
            height: 100px;
            background: linear-gradient(45deg, #f39c12, #e67e22);
            border-radius: 25px 25px 8px 8px;
            animation: vehicleMove3 22s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
        }

        .train::before {
            content: '🚂';
            position: absolute;
            font-size: 2rem;
            top: -10px;
            left: 20px;
            animation: trainSmoke 3s ease-in-out infinite;
        }

        @keyframes vehicleMove3 {
            0% { left: -300px; bottom: 120px; }
            50% { bottom: 140px; }
            100% { left: 100vw; bottom: 120px; }
        }

        @keyframes trainSmoke {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-25px) scale(1.3); opacity: 0; }
        }

        /* KENDARAAN 4: BUS HIACE */
        .bus {
            position: absolute;
            bottom: 110px;
            right: -350px;
            width: 280px;
            height: 110px;
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            border-radius: 15px 30px 8px 8px;
            animation: vehicleMove4 25s linear infinite reverse;
            z-index: 2;
        }

        .bus::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 30px;
            width: 40px;
            height: 25px;
            background: #34495e;
            border-radius: 5px;
            box-shadow: 60px 0 0 #34495e, 180px 0 0 #34495e;
        }

        .bus::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 40px;
            width: 30px;
            height: 30px;
            background: #1a252f;
            border-radius: 50%;
            box-shadow: 110px 0 0 #1a252f, 200px 0 0 #1a252f, 250px 0 0 #1a252f;
            animation: wheelSpinBus 1.2s linear infinite;
        }

        @keyframes vehicleMove4 {
            0% { right: -350px; }
            100% { right: 100vw; }
        }

        /* KENDARAAN 5: MOBIL SEDAN HITAM */
        .sedan {
            position: absolute;
            bottom: 70px;
            left: -160px;
            width: 160px;
            height: 65px;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 25px 25px 6px 6px;
            animation: vehicleMove5 16s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            box-shadow: 0 6px 20px rgba(44, 62, 80, 0.5);
        }

        .sedan::before {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 25px;
            width: 24px;
            height: 24px;
            background: #1a1a1a;
            border-radius: 50%;
            box-shadow: 80px 0 0 #1a1a1a;
            animation: wheelSpinSedan 0.9s linear infinite;
        }

        @keyframes vehicleMove5 {
            0% { left: -160px; }
            20% { bottom: 85px; }
            40% { bottom: 70px; }
            100% { left: 100vw; }
        }

        /* KENDARAAN 6: TRUK KONTAINER */
        .container-truck {
            position: absolute;
            bottom: 130px;
            left: -400px;
            height: 120px;
            animation: vehicleMove6 28s linear infinite;
        }

        .container-truck .cab {
            position: absolute;
            width: 150px;
            height: 100px;
            background: linear-gradient(45deg, #e17055, #d63031);
            border-radius: 10px 20px 5px 5px;
            left: 0;
        }

        .container-truck .container {
            position: absolute;
            width: 250px;
            height: 110px;
            background: linear-gradient(90deg, #00cec9, #55a3ff);
            left: 130px;
            border-radius: 5px;
            top: 5px;
        }

        .container-truck::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 30px;
            width: 32px;
            height: 32px;
            background: #222;
            border-radius: 50%;
            box-shadow: 110px 0 0 #222, 280px 0 0 #222;
            animation: wheelSpinTruck 1.1s linear infinite;
        }

        @keyframes vehicleMove6 {
            0% { left: -400px; }
            100% { left: 100vw; }
        }

        /* KENDARAAN 7: MOBIL POLISI */
        .police-car {
            position: absolute;
            bottom: 90px;
            left: -180px;
            width: 170px;
            height: 75px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 22px 22px 6px 6px;
            animation: vehicleMove7 14s ease-in-out infinite;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
            position: relative;
        }

        .police-car::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 30px;
            width: 50px;
            height: 25px;
            background: linear-gradient(90deg, #ff4757, #ff3838, #ff4757);
            background-size: 100% 100%;
            border-radius: 10px;
            animation: sirenFlash 0.6s linear infinite;
        }

        .police-car::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            width: 26px;
            height: 26px;
            background: #111;
            border-radius: 50%;
            box-shadow: 85px 0 0 #111;
            animation: wheelSpinPolice 0.7s linear infinite;
        }

        @keyframes vehicleMove7 {
            0% { left: -180px; }
            30% { left: 40%; }
            70% { left: 70%; }
            100% { left: 100vw; }
        }

        @keyframes sirenFlash {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        /* FORM LOGIN */
        .login-container {
            position: relative;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 450px;
            margin: 3rem auto;
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: formSlideUp 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes formSlideUp {
            0% { 
                transform: translateY(150px) scale(0.7); 
                opacity: 0;
            }
            60% { transform: translateY(-20px) scale(1.05); }
            100% { 
                transform: translateY(0) scale(1); 
                opacity: 1;
            }
        }

        .login-header h2 {
            color: white;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 1rem;
            text-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-group input {
            width: 100%;
            padding: 1.5rem 1.5rem 1.5rem 4rem;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.4s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .input-icon {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .login-btn {
            width: 100%;
            padding: 1.5rem;
            background: linear-gradient(45deg, #00b894, #00cec9);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 25px 50px rgba(0, 184, 148, 0.4);
        }

        .forgot-password {
            text-align: center;
            margin-top: 2rem;
        }

        .forgot-password a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .forgot-password a:hover {
            color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <!-- JALAN RAYA -->
    <div class="road"></div>

    <!-- 7 KENDARAAN -->
    <div class="car1"></div>
    <div class="truck1"></div>
    <div class="train"></div>
    <div class="bus"></div>
    <div class="sedan"></div>
    <div class="container-truck">
        <div class="cab"></div>
        <div class="container"></div>
    </div>
    <div class="police-car"></div>

    <!-- FORM LOGIN -->
    <div class="login-container">
        <div class="login-header">
            <h2>🚗 Login Terminal</h2>
            <p>Masukkan kredensial kendaraan Anda</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <span class="input-icon">🚙</span>
                <input type="email" id="email" placeholder="Nomor Plat / Email" required>
            </div>
            
            <div class="input-group">
                <span class="input-icon">🔑</span>
                <input type="password" id="password" placeholder="Kunci Kontak" required>
            </div>

            <button type="submit" class="login-btn">
                🚀 Mulai Perjalanan
            </button>
        </form>

        <div class="forgot-password">
            <a href="#">🔧 Lupa Kunci Kontak?</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.querySelector('.login-btn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '⏳ Mesin Menghangat...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '✅ Siap Berangkat!';
                btn.style.background = 'linear-gradient(45deg, #00b894, #55a3ff)';
                
                setTimeout(() => {
                    alert('🎉 Selamat! Kendaraan siap berangkat ke dashboard!');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.style.background = 'linear-gradient(45deg, #00b894, #00cec9)';
                }, 2000);
            }, 2500);
        });
    </script>
</body>
</html>
